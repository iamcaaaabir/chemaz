<!doctype html>

  <head>
    <meta charset="UTF-8" />

    <title>Past Olympiad Papers – ChemStar AZ</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .section-container {
        background: rgba(255, 255, 255, 0.9);
        border-radius: 12px;
        padding: 25px 30px;
        margin: 30px auto;
        max-width: 900px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
        color: #023e8a;
      }

      h1,
      h2 {
        text-align: center;
        color: #0077b6;
        margin-bottom: 20px;
      }

      .country-list {
        list-style: none;
        padding: 0;
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        justify-content: center;
        margin-bottom: 40px;
      }

      .country-list li {
        background-color: #00b4d8;
        color: white;
        padding: 12px 20px;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s ease;
        min-width: 120px;
        text-align: center;
      }

      .country-list li:hover {
        background-color: #0096c7;
      }

      a.country-link {
        color: inherit;
        text-decoration: none;
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
